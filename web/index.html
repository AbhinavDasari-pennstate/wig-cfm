<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wonderful.ai × WIG — Customer Feedback Intelligence</title>
<style>
  :root {
    --bg:#080b15; --bg2:#0c1124; --panel:#111733; --panel2:#0e1430; --line:#1e2748;
    --ink:#eaf0ff; --dim:#8b97c2; --faint:#5c6691;
    --cyan:#34d6e8; --green:#36d39b; --amber:#f5b14c; --red:#ff5d6c; --violet:#a78bfa; --blue:#5b8cff;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--ink);
    background:radial-gradient(1200px 700px at 80% -10%,#16204a 0,transparent 60%),
               radial-gradient(900px 600px at -10% 10%,#10193a 0,transparent 55%),var(--bg);
  }
  a { color:inherit; }
  .app { display:grid; grid-template-columns:262px 1fr; min-height:100vh; }

  /* Sidebar */
  .side { border-right:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),transparent); padding:20px 14px; position:sticky; top:0; height:100vh; overflow:auto; }
  .brand { font-weight:700; letter-spacing:.5px; font-size:15px; }
  .brand b { color:var(--cyan); }
  .brand .x { color:var(--faint); margin:0 6px; }
  .tag { color:var(--dim); font-size:11px; margin-top:3px; }
  .navgroup { margin-top:22px; }
  .navgroup h4 { color:var(--faint); font-size:10.5px; text-transform:uppercase; letter-spacing:1.3px; margin:0 0 8px 8px; font-weight:700; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav button { text-align:left; background:transparent; border:0; color:var(--dim); padding:9px 10px; border-radius:9px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:9px; line-height:1.25; }
  .nav button:hover { background:#141b3a; color:var(--ink); }
  .nav button.active { background:linear-gradient(90deg,#17204a,#131a3c); color:var(--ink); box-shadow:inset 0 0 0 1px var(--line); }
  .dot { width:7px; height:7px; border-radius:50%; flex:none; }
  .safetychip { margin-top:18px; border:1px solid #1d3a36; background:linear-gradient(180deg,#0d2420,#0c1a22); border-radius:12px; padding:11px 12px; }
  .safetychip .h { font-size:10.5px; letter-spacing:1px; color:var(--green); text-transform:uppercase; font-weight:700; }
  .safetychip .n { font-size:22px; font-weight:800; color:#fff; }
  .safetychip .s { font-size:11px; color:var(--dim); }

  /* Main */
  .main { padding:26px 34px 60px; max-width:1080px; }
  .crumb { color:var(--faint); font-size:11.5px; letter-spacing:.4px; text-transform:uppercase; }
  h1 { font-size:25px; margin:6px 0 2px; letter-spacing:.2px; }
  h1 small { display:block; font-size:13.5px; color:var(--dim); font-weight:400; margin-top:5px; letter-spacing:.1px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .chip { font-size:11.5px; padding:5px 10px; border-radius:999px; border:1px solid var(--line); color:var(--dim); background:#0e1430; }
  .chip.cy { color:var(--cyan); border-color:#1b4350; }
  .chip.gr { color:var(--green); border-color:#1d4339; }
  .chip.am { color:var(--amber); border-color:#4a3a1c; }

  .card { background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-top:18px; }
  .msgIn { border-left:3px solid var(--blue); background:#0d1430; border-radius:10px; padding:11px 14px; color:#cdd8ff; font-size:13.5px; }
  .msgIn .who { color:var(--faint); font-size:11px; margin-bottom:3px; }

  .stage { margin-top:14px; border:1px solid var(--line); border-radius:13px; overflow:hidden; }
  .stage .sh { padding:10px 14px; font-weight:600; font-size:13px; background:#0f1738; border-left:3px solid var(--violet); display:flex; align-items:center; gap:8px; }
  .steps { padding:6px 14px 12px; }
  .step { display:flex; gap:10px; align-items:baseline; padding:6px 0; font-size:13px; border-bottom:1px dashed #161e3e; }
  .step:last-child { border-bottom:0; }
  .step .lab { min-width:210px; color:var(--ink); }
  .step .lab.warn { color:var(--red); font-weight:600; }
  .tool { font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--cyan); background:#0a1730; border:1px solid #14304a; padding:1px 7px; border-radius:6px; }
  .tool.safety { color:var(--red); border-color:#43212a; background:#1a0e13; }
  .step .det { color:var(--dim); }

  .reply { border-radius:12px; padding:13px 15px; margin-top:12px; background:#0d1a16; border:1px solid #18402f; }
  .reply.warnless { background:#101633; border-color:#23305c; }
  .reply .who { font-size:11px; color:var(--green); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; font-weight:700; }
  .reply .body { font-size:14.5px; line-height:1.65; color:#eaf2ff; }
  .reply[dir="rtl"] .body { font-size:16px; }

  .edge { margin-top:16px; border-radius:12px; padding:13px 16px; background:linear-gradient(90deg,#10241d,#0d1830); border:1px solid #1e4035; font-size:13.5px; }
  .edge b { color:var(--green); }

  .grid { display:grid; gap:14px; }
  .g3 { grid-template-columns:repeat(3,1fr); }
  .g4 { grid-template-columns:repeat(4,1fr); }
  .metric { background:#0e1533; border:1px solid var(--line); border-radius:14px; padding:15px 16px; }
  .metric .b { font-size:12px; color:var(--dim); letter-spacing:.4px; }
  .metric .row { display:flex; gap:14px; margin-top:9px; }
  .metric .k { font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.6px; }
  .metric .v { font-size:21px; font-weight:800; }
  .pos { color:var(--green); } .neg{ color:var(--red);} .neu{color:var(--amber);}

  .scoretiles { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .tile { border-radius:16px; padding:18px; background:linear-gradient(180deg,#0d2420,#0b1622); border:1px solid #1c3a35; }
  .tile .v { font-size:34px; font-weight:850; color:#fff; line-height:1; }
  .tile .l { font-size:12px; color:var(--dim); margin-top:8px; }
  .tile.red { background:linear-gradient(180deg,#241016,#1a0e16); border-color:#4a2230; }
  .tile.red .v{ color:#ffd9de; }

  table.caps { width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
  table.caps th, table.caps td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.caps th { color:var(--faint); font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; }
  .t-ok { font-family:ui-monospace,Consolas,monospace; font-size:11.5px; color:var(--green); background:#0c1f18; border:1px solid #18402f; padding:2px 7px; border-radius:6px; display:inline-block; margin:2px 4px 2px 0; }
  .t-no { font-family:ui-monospace,Consolas,monospace; font-size:11.5px; color:var(--red); background:#1a0e13; border:1px solid #43212a; padding:2px 7px; border-radius:6px; display:inline-block; margin:2px 4px 2px 0; text-decoration:line-through; }

  .queueItem { border:1px solid var(--line); border-radius:13px; padding:14px 16px; margin-top:12px; background:#0e1533; }
  .queueItem .top { display:flex; justify-content:space-between; gap:12px; }
  .badge { font-size:10.5px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--dim); }
  .badge.proc{ color:var(--amber); border-color:#4a3a1c; } .badge.warr{ color:var(--cyan); border-color:#1b4350; }
  .badge.hi { color:var(--red); border-color:#43212a; }
  .mono { font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--faint); }
  pre.digest { background:#0a1024; border:1px solid var(--line); border-radius:12px; padding:14px 16px; overflow:auto; font-size:12px; color:#bcc8f2; line-height:1.55; }
  .attack { border:1px solid #43212a; background:linear-gradient(180deg,#1a0e13,#140b12); border-radius:13px; padding:14px 16px; margin-top:12px; }
  .attack .ph { font-family:ui-monospace,Consolas,monospace; font-size:12px; color:#ffb3bc; background:#220f15; border:1px dashed #4a2230; padding:2px 7px; border-radius:6px; display:inline-block; margin:3px 5px 0 0; }
  .loading { color:var(--dim); padding:50px; text-align:center; }
  .foot { color:var(--faint); font-size:11px; margin-top:26px; }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><b>WONDERFUL.AI</b><span class="x">×</span>WIG</div>
    <div class="tag">Customer Feedback Intelligence</div>

    <div class="navgroup">
      <h4>Trust</h4>
      <div class="nav" id="nav-trust"></div>
    </div>
    <div class="navgroup">
      <h4>Live scenarios</h4>
      <div class="nav" id="nav-scen"></div>
    </div>
    <div class="navgroup">
      <h4>Leadership</h4>
      <div class="nav" id="nav-lead"></div>
    </div>

    <div class="safetychip">
      <div class="h">Autonomous spend</div>
      <div class="n" id="sc-spend">—</div>
      <div class="s">purchase orders placed by agents</div>
    </div>
  </aside>

  <main class="main" id="content"><div class="loading">Running the agents…</div></main>
</div>

<script>
const COLORS = { intake:'#34d6e8', warranty:'#5b8cff', quality:'#f5b14c', coaching:'#a78bfa', proc:'#36d39b', safety:'#ff5d6c' };
const RTL = new Set(['ARABIC']);
let REPORT = null, ACTIVE = 'trust';

const el = (t, c, h) => { const e=document.createElement(t); if(c) e.className=c; if(h!=null) e.innerHTML=h; return e; };
const npsClass = v => v>=30?'pos':(v>=0?'neu':'neg');

async function boot(){
  try {
    const r = await fetch('/api/demo'); REPORT = await r.json();
  } catch(e){ document.getElementById('content').innerHTML='<div class="loading">Could not load /api/demo — is the server running?</div>'; return; }
  ACTIVE = (location.hash || '#trust').slice(1);
  buildNav(); document.getElementById('sc-spend').textContent = REPORT.safety_summary.purchase_orders_created;
  render(ACTIVE);
}

function buildNav(){
  const trust = document.getElementById('nav-trust');
  trust.appendChild(navBtn('trust','Transaction-safety','#36d39b'));
  const scen = document.getElementById('nav-scen');
  REPORT.scenarios.forEach((s,i)=> scen.appendChild(navBtn('s'+i, s.title, scenColor(s.id))));
  const lead = document.getElementById('nav-lead');
  lead.appendChild(navBtn('mis','Executive MIS digest','#f5b14c'));
  lead.appendChild(navBtn('queue','Human approval queue','#a78bfa'));
}
function scenColor(id){ return ({warranty_arabic:COLORS.warranty, oos_recommend:COLORS.proc, manipulation:COLORS.safety, velocity_digest:COLORS.quality, coaching_hindi:COLORS.coaching, hitl_safety:COLORS.intake})[id] || COLORS.intake; }
function navBtn(key,label,color){
  const b = el('button', key===ACTIVE?'active':'', `<span class="dot" style="background:${color}"></span><span>${label}</span>`);
  b.onclick = ()=>{ ACTIVE=key; document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(key); };
  return b;
}

function render(key){
  const c = document.getElementById('content'); c.innerHTML='';
  if(key==='mis') return c.appendChild(viewMIS());
  if(key==='queue') return c.appendChild(viewQueue());
  const i = +key.slice(1);
  if(key[0]==='s' && REPORT.scenarios[i]) return c.appendChild(viewScenario(REPORT.scenarios[i]));
  c.appendChild(viewTrust());
}

/* ---------- Scenario view ---------- */
function viewScenario(s){
  const w = el('div');
  w.appendChild(el('div','crumb','Live scenario · '+s.channel));
  w.appendChild(el('h1', null, `${s.title}<small>${s.tagline}</small>`));

  const inp = el('div','card');
  inp.appendChild(el('div','chips', `<span class="chip cy">${s.input.lang}</span><span class="chip">${s.input.customer}</span>`));
  const m = el('div','msgIn'); m.style.marginTop='12px';
  m.innerHTML = `<div class="who">inbound feedback</div>`;
  const body = el('div',null, s.input.text); if(RTL.has(s.input.lang)) body.setAttribute('dir','rtl');
  m.appendChild(body); inp.appendChild(m); w.appendChild(inp);

  s.stages.forEach(st=>{
    const stage = el('div','stage');
    stage.appendChild(el('div','sh', `<span class="dot" style="background:${COLORS.violet}"></span>${st.agent}`));
    const steps = el('div','steps');
    st.steps.forEach(x=>{
      const row = el('div','step');
      row.appendChild(el('div','lab'+(String(x.label).startsWith('⚠')?' warn':''), x.label));
      const det = el('div','det');
      if(x.tool) det.appendChild(el('span','tool'+(x.tool==='safety'?' safety':''), x.tool));
      det.appendChild(document.createTextNode(' '+x.detail));
      row.appendChild(det); steps.appendChild(row);
    });
    stage.appendChild(steps); w.appendChild(stage);
  });

  (s.messages||[]).forEach(msg=>{
    const r = el('div','reply'); if(RTL.has(msg.language)) r.setAttribute('dir','rtl');
    r.appendChild(el('div','who', `${msg.label} · ${msg.language}`));
    r.appendChild(el('div','body', msg.text)); w.appendChild(r);
  });

  if(s.id==='manipulation') w.appendChild(attackPanel(s.result.safety_event));
  w.appendChild(el('div','edge', `<b>Why it wins —</b> ${s.edge}`));
  return w;
}
function attackPanel(ev){
  const a = el('div','attack');
  a.innerHTML = `<div class="who" style="color:#ff8a96;font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700">Contained manipulation</div>`;
  a.appendChild(el('div',null,`<span style="color:#ffd9de">Attempted action:</span> <b>${(ev&&ev.attempted_action)||'place_purchase_order'}</b> &nbsp;·&nbsp; <span style="color:#ffd9de">Capability available:</span> <b>${ev&&ev.capability_available===false?'NO':'—'}</b>`));
  const ph = el('div'); ph.style.marginTop='8px';
  (ev&&ev.injected_phrases||[]).forEach(p=> ph.appendChild(el('span','ph', p)));
  a.appendChild(ph);
  a.appendChild(el('div',null,`<div style="margin-top:9px;color:#ffc4cb">${(ev&&ev.outcome)||'contained — routed to human buyer'}</div>`));
  return a;
}

/* ---------- Trust & Safety view ---------- */
function viewTrust(){
  const w = el('div');
  w.appendChild(el('div','crumb','Enterprise trust'));
  w.appendChild(el('h1', null, `Propose, don’t transact<small>The agents can read, record and notify a human — they hold no tool that commits money, goods, or an order. A jailbroken agent still cannot spend.</small>`));

  const ss = REPORT.safety_summary;
  const tiles = el('div','scoretiles');
  tiles.appendChild(tile(ss.purchase_orders_created,'POs auto-created by agents'));
  tiles.appendChild(tile(ss.transactional_tools_available,'Transactional tools wired to agents'));
  tiles.appendChild(tile(ss.manipulation_attempts_contained,'Injection attacks contained', ss.manipulation_attempts_contained>0));
  tiles.appendChild(tile(ss.human_approval_tasks,'Decisions routed to humans'));
  w.appendChild(tiles);

  const cap = el('div','card');
  cap.appendChild(el('div',null,'<b>Capability manifest</b> <span style="color:var(--dim);font-size:12.5px">— read straight from the MCP servers at runtime</span>'));
  const tbl = el('table','caps');
  tbl.innerHTML = '<tr><th>MCP server</th><th>Wired (read · record · notify)</th><th>Transactional — absent</th></tr>';
  Object.entries(REPORT.capabilities).forEach(([name,c])=>{
    const tr = el('tr');
    tr.appendChild(el('td',null,`<span class="mono">${name}</span>`));
    tr.appendChild(el('td',null, c.wired.map(t=>`<span class="t-ok">${t}</span>`).join('')));
    tr.appendChild(el('td',null, c.absent_transactional.length? c.absent_transactional.map(t=>`<span class="t-no">${t}</span>`).join('') : '<span style="color:var(--faint)">—</span>'));
    tbl.appendChild(tr);
  });
  cap.appendChild(tbl); w.appendChild(cap);

  const atk = REPORT.snapshot.safety_events||[];
  if(atk.length){ const c=el('div','card'); c.appendChild(el('div',null,'<b>Contained this session</b>')); atk.forEach(e=>c.appendChild(attackPanel(e))); w.appendChild(c); }
  w.appendChild(el('div','foot','Deterministic offline demo · in production the same agents run on the Claude Agent SDK; the guardrail holds because the capability is absent, not because a prompt asks nicely.'));
  return w;
}
function tile(v,l,red){ const t=el('div','tile'+(red?' red':'')); t.appendChild(el('div','v',v)); t.appendChild(el('div','l',l)); return t; }

/* ---------- Executive MIS ---------- */
function viewMIS(){
  const s = REPORT.scenarios.find(x=>x.id==='velocity_digest');
  const w = el('div');
  w.appendChild(el('div','crumb','Leadership · weekly digest'));
  w.appendChild(el('h1', null, `Executive MIS digest<small>CSAT · NPS · CES per brand, with a velocity watch list</small>`));

  const g = el('div','grid g3');
  Object.entries(s.result.metrics).forEach(([brand,m])=>{
    const card = el('div','metric');
    card.appendChild(el('div','b', `${brand} · ${m.tickets} tickets`));
    const row = el('div','row');
    row.appendChild(el('div',null,`<div class="k">CSAT</div><div class="v">${m.csat}<span style="font-size:12px;color:var(--faint)">/5</span></div>`));
    row.appendChild(el('div',null,`<div class="k">NPS</div><div class="v ${npsClass(m.nps)}">${m.nps>=0?'+':''}${m.nps}</div>`));
    row.appendChild(el('div',null,`<div class="k">CES</div><div class="v">${m.ces}<span style="font-size:12px;color:var(--faint)">/5</span></div>`));
    card.appendChild(row); g.appendChild(card);
  });
  w.appendChild(g);

  const wl = el('div','card');
  wl.appendChild(el('div',null,'<b>🔴 Watch list</b> <span style="color:var(--dim);font-size:12.5px">— velocity-detected, before any volume threshold</span>'));
  (s.result.watch_list||[]).forEach(x=> wl.appendChild(el('div',null,`<div style="margin-top:8px;color:#ffd2a6">• ${x}</div>`)));
  if(!(s.result.watch_list||[]).length) wl.appendChild(el('div',null,'<div style="margin-top:8px;color:var(--dim)">No velocity alerts this week.</div>'));
  w.appendChild(wl);

  const pre = el('pre','digest', s.digest_markdown.replace(/</g,'&lt;'));
  const c = el('div','card'); c.appendChild(el('div',null,'<b>Digest as delivered</b>')); c.appendChild(pre); w.appendChild(c);
  return w;
}

/* ---------- Approval queue ---------- */
function viewQueue(){
  const q = REPORT.snapshot.human_queue||[];
  const w = el('div');
  w.appendChild(el('div','crumb','Human-in-the-loop'));
  w.appendChild(el('h1', null, `Human approval queue<small>Every spend decision the agents surfaced — awaiting a person</small>`));
  q.forEach(t=>{
    const item = el('div','queueItem');
    const proc = t.type==='PROCUREMENT_APPROVAL';
    const top = el('div','top');
    top.innerHTML = `<div><b>${proc?'Procurement reorder':'Warranty fulfillment'}</b> <span class="mono">${t.workflow_task_id}</span></div>`;
    const badges = el('div');
    badges.appendChild(el('span','badge '+(proc?'proc':'warr'), t.assigned_to));
    if(t.priority && String(t.priority).startsWith('HIGH')) badges.appendChild(el('span','badge hi',' '+t.priority));
    top.appendChild(badges); item.appendChild(top);
    const detail = proc
      ? `<div style="margin-top:8px;color:var(--dim)">SKU <span class="mono">${t.sku}</span> · ${t.store} · reason <b style="color:var(--amber)">${t.reason}</b></div><div style="margin-top:6px">${t.recommendation||''}</div>`
      : `<div style="margin-top:8px;color:var(--dim)">${t.brand} · ${t.product} · declared AED ${t.declared_value_aed}</div><div style="margin-top:6px;color:var(--faint)">Drafted reply ready to send on approval.</div>`;
    item.appendChild(el('div',null,detail));
    w.appendChild(item);
  });
  if(!q.length) w.appendChild(el('div','card','Nothing awaiting approval.'));
  return w;
}

boot();
</script>
</body>
</html>
