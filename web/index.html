function buildTimelineSteps(item, isProc) {
  const ch = channelLabel(item.channel || 'EMAIL');
  if(isProc) {
    const reason = item.reason || 'OUT_OF_STOCK';
    const action = reason==='DELAYED_PO'
      ? {what:'Agent 5 found open PO — 3 days overdue', agent:'PO-778412 · supplier flagged'}
      : reason==='VELOCITY_SPIKE'
        ? {what:'Agent 3 flagged velocity spike', agent:'new SKU · 4 complaints in 3d'}
        : {what:'Agent 5 diagnosed stock gap', agent:'0 shelf · 0 backroom'};
    return [
      {when:'06:02 GST', what:'Signal received', agent:`via ${ch}`},
      {when:'06:15 GST', what:'Agent 1 triaged → procurement', agent:'routed to Agent 5'},
      {when:'06:16 GST', what:action.what, agent:action.agent},
      {when:'06:16 GST', what:'Recommendation prepared for buyer', agent:'no PO placed — propose only'},
      {when:'now', what:'Awaiting your approval', agent:'nothing dispatched yet', now:true},
    ];
  }
  const high = item.priority && item.priority.toString().toUpperCase().startsWith('HIGH');
  return [
    {when:'06:02 GST', what:'Feedback received', agent:`via ${ch}`},
    {when:'06:14 GST', what:'Agent 1 triaged → WARRANTY_RETURN', agent:'routed to Agent 2'},
    {when:'06:15 GST', what:'Agent 2 checked warranty → valid', agent:`claim ${item.claim_id||'opened'}`},
    {when:'06:15 GST', what:`Value AED ${item.declared_value_aed} ${high?'> 500 → routed HIGH':'≤ 500 → standard'}`, agent:'deterministic rule'},
    {when:'now', what:'Reply drafted · awaiting approval', agent:'no message sent yet', now:true},
  ];
}
function precedentFor(item, isProc) {
  const idx = REPORT.precedent_index || {};
  const brand = isProc ? (SKU_NAMES[item.sku]||'').split(' ')[0].toUpperCase() : (item.brand||'');
  const rec = idx[brand];
  if(!rec) return null;
  const cat = isProc ? 'PRODUCT_QUALITY' : 'WARRANTY_RETURN';
  const catCount = (rec.by_category||{})[cat] || 0;
  const label = cat.replace('_',' ').toLowerCase();
  if(catCount > 0) return `<b>${catCount} similar ${brand} ${label} case${catCount!==1?'s':''}</b> on record · ${rec.resolved} resolved.`;
  return `<b>${rec.total} ${brand} case${rec.total!==1?'s':''}</b> on record · ${rec.resolved} resolved. No prior on this exact issue.`;
}

    ...(isProc?[]:[{ok:true, t:'Warranty validity', s:'within coverage window'}]),

  ];
}

function renderFrenChips() {
  const wrap = qs('#fren-chips');
  if(!wrap) return;

const FREN_STOP = new Set(['the','a','an','is','are','do','i','to','of','for','this','it','what','should','can','you','me','my','on','in','and','or','if','be','how','that','with','at','as','about','please','tell','give','need']);
function frenMatch(text) {
  const words = text.toLowerCase().match(/[a-z]+/g) || [];
  const terms = words.filter(w => w.length > 2 && !FREN_STOP.has(w));
  let best = null, bestScore = 0;
  (FREN_CHIPS || []).forEach(c => {
    const hay = (c.q + ' ' + c.a).toLowerCase();
    let score = 0;
    terms.forEach(t => { if(hay.includes(t)) score += (c.q.toLowerCase().includes(t) ? 2 : 1); });
    if(score > bestScore) { bestScore = score; best = c; }
  });
  return bestScore >= 2 ? best.a : FALLBACK_FREN;
}
function sendFrenMsg() {
  const inp = qs('#fren-input');
  if(!inp || !inp.value.trim()) return;
  const text = inp.value.trim();

  appendFrenMsg('user', text);
  qs('#fren-chips').innerHTML = '';
  showThinking();
  const reply = frenMatch(text);
  setTimeout(() => { hideThinking(); appendFrenMsg('fren', reply); renderFrenChips(); }, 900);
}

    const t = new Date(entry.ts);
    const tstr = t.toISOString().slice(11,19);
    const detail = Object.entries(entry).filter(([k])=>!['kind','ts'].includes(k)).map(([k,v])=>`${k}: ${v}`).join(' · ');
    row.innerHTML = `<span class="ts">${tstr}</span><span class="kind">${entry.kind}</span><span>${detail.slice(0,80)}</span>`;
    auditWrap.appendChild(row);
  });
  if(audit.length > 10) {
    const more = txt('div','','');
    more.style.cssText = 'padding:10px 14px;font-size:12px;color:var(--teal);cursor:pointer;font-weight:600;';
    more.textContent = `Show all ${audit.length} entries →`;
    let expanded = false;
    more.onclick = () => {
      if(expanded) return;
      expanded = true;
      audit.slice(10).forEach(entry => {
        const row = el('div','audit-entry');
        const tstr = new Date(entry.ts).toISOString().slice(11,19);
        const detail = Object.entries(entry).filter(([k])=>!['kind','ts'].includes(k)).map(([k,v])=>`${k}: ${v}`).join(' · ');
        row.innerHTML = `<span class="ts">${tstr}</span><span class="kind">${entry.kind}</span><span>${detail.slice(0,80)}</span>`;
        auditWrap.insertBefore(row, more);
      });
      more.style.display = 'none';
    };
    auditWrap.appendChild(more);
  }
  body.appendChild(auditWrap);

  w.appendChild(body);
  main.innerHTML = '';
  main.appendChild(w);
}

/* ─────────────── RIGHT RAIL ─────────────── */
/* ─────────────── CLOSED LOOP ─────────────── */
function viewLoop(main) {
  const rows = REPORT.closed_loop || [];
  const w = el('div');
  const head = el('div','sec-head');
  head.innerHTML = `<div class="sec-crumb">Resolution · Written back to SAP</div><div class="sec-title">Closed Loop</div><div class="sec-sub">Resolved cases with CSAT / NPS / CES written back to SAP — agents propose and record; they are not the system of record.</div>`;
  w.appendChild(head);
  const body = el('div','sec-body section-animate');

  if(!rows.length) {
    body.innerHTML = '<div class="rail-empty" style="height:40vh"><div class="re-icon">◷</div><div class="re-title">No closed loops yet</div><div class="re-sub">Resolutions appear here once agents write scores back to SAP.</div></div>';
    w.appendChild(body); main.innerHTML=''; main.appendChild(w); return;
  }

  const csats = rows.map(r=>r.csat).filter(v=>v!=null);
  const avg = csats.length ? (csats.reduce((a,b)=>a+b,0)/csats.length).toFixed(1) : '—';
  const kpis = el('div','cl-kpis');
  kpis.innerHTML = `
    <div class="cl-kpi"><div class="k">Loops closed</div><div class="v">${rows.length}</div><div class="s">surveys + scores written to SAP</div></div>
    <div class="cl-kpi"><div class="k">Avg resolution CSAT</div><div class="v ${csatClass(parseFloat(avg)||0)}">${avg}</div><div class="s">across closed cases</div></div>
    <div class="cl-kpi"><div class="k">System of record</div><div class="v">SAP</div><div class="s">agents record, never own the data</div></div>`;
  body.appendChild(kpis);

  const list = el('div','cl-list');
  const th = el('div','cl-th');
  th.innerHTML = '<span>Case</span><span>Channel</span><span>CSAT</span><span>NPS</span><span>CES</span><span>SAP write-back</span>';
  list.appendChild(th);
  rows.forEach(r => {
    const name = SKU_NAMES[r.product] || r.product;
    const row = el('div','cl-row'+(SEL&&SEL.type==='loop'&&SEL.data.sap_ticket_id===r.sap_ticket_id?' active':''));
    row.innerHTML = `
      <div class="cl-case">${name}<span class="sub">${r.brand} · ${r.category}</span></div>
      <span class="badge neutral">${channelLabel(r.channel)}</span>
      <span class="cl-v ${r.csat!=null?csatClass(r.csat):''}">${r.csat??'—'}</span>
      <span class="cl-v ${r.nps!=null?npsClass(r.nps):''}">${r.nps!=null?fmtNPS(r.nps):'—'}</span>
      <span class="cl-v ${r.ces!=null?csatClass(r.ces):''}">${r.ces??'—'}</span>
      <span class="cl-sap">✓ ${r.sap_ticket_id||'SAP'}</span>`;
    row.onclick = () => selectItem('loop', r, row);
    list.appendChild(row);
  });
  body.appendChild(list);
  body.appendChild(txt('div','cl-note','Every row is a resolution the agents recorded in SAP. No purchase, dispatch, or courier action was taken by an agent.'));
  w.appendChild(body);
  main.innerHTML=''; main.appendChild(w);
}

function renderRail() {
  const rail = qs('#rail');
  if(!SEL) { railEmpty(rail); return; }
  if(SEL.type === 'brand') railBrand(rail, SEL.data);
  else if(SEL.type === 'alert') railAlert(rail, SEL.data);
  else if(SEL.type === 'run') railRun(rail, SEL.data);
  else if(SEL.type === 'loop') railLoop(rail, SEL.data);
  else railEmpty(rail);
}
function railLoop(rail, r) {
  rail.innerHTML = `
    <div class="rail-head"><div class="rail-crumb">Closed Loop</div><div class="rail-title">${SKU_NAMES[r.product]||r.product}</div><div class="rail-sub">${r.brand} · ${r.category}</div></div>
    <div class="rail-body">
      <div class="rail-section"><div class="rail-section-k">Resolution scores</div>
        <div class="stat-pair"><div class="stat-box"><div class="k">CSAT</div><div class="v ${r.csat!=null?csatClass(r.csat):''}">${r.csat??'—'}</div></div><div class="stat-box"><div class="k">NPS</div><div class="v ${r.nps!=null?npsClass(r.nps):''}">${r.nps!=null?fmtNPS(r.nps):'—'}</div></div></div>
        <div class="stat-pair"><div class="stat-box"><div class="k">CES</div><div class="v">${r.ces??'—'}</div></div><div class="stat-box"><div class="k">Channel</div><div class="v" style="font-size:14px">${channelLabel(r.channel)}</div></div></div>
      </div>
      <div class="rail-section"><div class="rail-section-k">SAP write-back</div><div class="rail-kv"><span class="k">Ticket</span><span class="v mono">${r.sap_ticket_id||'—'}</span></div><div class="rail-kv"><span class="k">Language</span><span class="v">${langLabel(r.language)}</span></div></div>
      ${r.notes?`<div class="rail-section"><div class="rail-section-k">Resolution notes</div><div class="doc-rec">${r.notes}</div></div>`:''}
    </div>`;
}
function railEmpty(rail) {
  const b = railBriefing(ACTIVE);
  rail.innerHTML = '';
  const head = el('div','rail-head');
  head.innerHTML = `<div class="rail-crumb">${b.crumb}</div><div class="rail-title">${b.title}</div><div class="rail-sub">${b.sub}</div>`;
  rail.appendChild(head);
  const body = el('div','rail-body');
  if(b.stats) {
    const sp = el('div','stat-pair');
    b.stats.forEach(s => sp.appendChild(Object.assign(el('div','stat-box'), {innerHTML:`<div class="k">${s.k}</div><div class="v ${s.cls||''}">${s.v}</div>`})));
    body.appendChild(sp);
  }
  b.sections.forEach(s => {
    if(!s.rows.length) return;
    const sec = el('div','rail-section');
    sec.innerHTML = `<div class="rail-section-k">${s.k}</div>` + s.rows.map(r => `<div class="rail-kv"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('');
    body.appendChild(sec);
  });
  body.appendChild(txt('div','propose-note', b.hint));
  rail.appendChild(body);
}
function railBriefing(active) {
  const bm = REPORT.brand_metrics || {};
  const brands = Object.keys(bm);
  const alerts = getAlerts();
  const queue = pendingQueue();
  const high = queue.filter(i => i.priority && i.priority.toString().toUpperCase().startsWith('HIGH')).length;
  const ss = REPORT.safety_summary || {};

  if(active === 'quality') {
    const aBrands = [...new Set(alerts.map(a => a.brand))];
    return {
      crumb:'Quality · Agent 3', title:'Scan summary', sub:'Daily scan · 06:00 GST',
      stats:[{k:'Velocity alerts', v:alerts.length, cls:alerts.length?'neg':''},{k:'Brands hit', v:aBrands.length}],
      sections:[{k:'Flagged products', rows:alerts.map(a => [`${a.brand} ${a.sku||a.product_sku}`, a.velocity_pct==null?'new SKU':'+'+a.velocity_pct+'%'])}],
      hint:'Select an alert to inspect the cluster.'
    };
  }
  if(active === 'queue') {
    const proc = queue.filter(i => i.type==='PROCUREMENT_APPROVAL').length;
    const warr = queue.filter(i => i.type==='WARRANTY_FULFILLMENT').length;
    return {
      crumb:'Human-in-the-loop', title:'Queue summary', sub:'Agents drafted every reply',
      stats:[{k:'Pending', v:queue.length},{k:'High priority', v:high, cls:high?'neg':''}],
      sections:[{k:'By type', rows:[['Procurement', proc],['Warranty', warr]]}],
      hint:'Open an item to work it with fren.'
    };
  }
  if(active === 'runs') {
    const sc = REPORT.scenarios || [];
    const ch = REPORT.channel_breakdown || {};
    return {
      crumb:'Agent activity', title:'Run summary', sub:'All agents · today',
      stats:[{k:'Runs', v:sc.length},{k:'Failures', v:0, cls:'pos'}],
      sections:[{k:'Channels', rows:Object.entries(ch).map(([c,n]) => [channelLabel(c), n])}],
      hint:'Select a run to see its full trace.'
    };
  }
  if(active === 'guardrails') {
    return {
      crumb:'Trust & safety', title:'Safety posture', sub:"Propose, don't transact",
      stats:[{k:'POs auto-created', v:ss.purchase_orders_created??0, cls:'pos'},{k:'Txn tools wired', v:ss.transactional_tools_available??0, cls:'pos'}],
      sections:[{k:'This session', rows:[['Manipulation contained', ss.manipulation_attempts_contained??0],['HITL escalations', ss.human_approval_tasks??0]]}],
      hint:'The guarantee holds because the capability is absent.'
    };
  }
  if(active === 'loop') {
    const rows = REPORT.closed_loop || [];
    const csats = rows.map(r => r.csat).filter(v => v!=null);
    const avg = csats.length ? (csats.reduce((a,b)=>a+b,0)/csats.length).toFixed(1) : '—';
    return {
      crumb:'Resolution', title:'Closed-loop summary', sub:'Written back to SAP',
      stats:[{k:'Loops closed', v:rows.length},{k:'Avg CSAT', v:avg, cls:csatClass(parseFloat(avg)||0)}],
      sections:[{k:'Record', rows:[['System of record','SAP'],['Owned by agents','No']]}],
      hint:'Select a case to see the SAP write-back.'
    };
  }
  // overview (default)
  const topAlert = alerts[0];
  const watch = brands.length ? brands.map(x => [x, bm[x].nps]).sort((a,b)=>a[1]-b[1])[0] : null;
  return {
    crumb:'Overview · all brands', title:"Today's briefing", sub:'Snapshot across all brands',
    stats:[{k:'Quality alerts', v:alerts.length, cls:alerts.length?'neg':''},{k:'Awaiting you', v:queue.length, cls:high?'neu':''}],
    sections:[{k:'Where to look', rows:[
      ['Top alert', topAlert ? `${topAlert.brand} ${topAlert.sku||topAlert.product_sku}` : 'none'],
      ['Watch brand', watch ? `${watch[0]} (${fmtNPS(watch[1])})` : '—'],
      ['High priority', high],
      ['Safety contained', ss.manipulation_attempts_contained??0],
      ['Last scan', '06:00 GST'],
    ]}],
    hint:'Click any brand or queue row for full detail.'
  };
}
function railBrand(rail, {name, m, p}) {
  rail.innerHTML = '';
  const tr_csat = trendArrow(m.csat, p?p.csat:null);
  const tr_nps  = trendArrow(m.nps,  p?p.nps:null);
  const tr_ces  = trendArrow(m.ces,  p?p.ces:null);
  rail.innerHTML = `
    <div class="rail-head">
      <div class="rail-crumb">Brand Detail</div>
      <div class="rail-title">${name}</div>
      <div class="rail-sub">${BRAND_REGIONS[name]||''} · ${m.tickets} tickets this week</div>
    </div>
    <div class="rail-body">
      <div class="rail-section">
        <div class="rail-section-k">This week</div>
        <div class="stat-pair">
          <div class="stat-box"><div class="k">CSAT</div><div class="v ${csatClass(m.csat)}">${fmtCSAT(m.csat)}</div></div>
          <div class="stat-box"><div class="k">NPS</div><div class="v ${npsClass(m.nps)}">${fmtNPS(m.nps)}</div></div>
        </div>
        <div class="stat-pair">
          <div class="stat-box"><div class="k">CES</div><div class="v ${csatClass(m.ces)}">${fmtCSAT(m.ces)}</div></div>
          <div class="stat-box"><div class="k">Tickets</div><div class="v">${m.tickets}</div></div>
        </div>
      </div>
      ${p?`<div class="rail-section">
        <div class="rail-section-k">vs prior week</div>
        <div class="rail-kv"><span class="k">CSAT</span><span class="v"><span class="arrow ${tr_csat.cls}">${tr_csat.sym}</span> ${tr_csat.note} (was ${fmtCSAT(p.csat)})</span></div>
        <div class="rail-kv"><span class="k">NPS</span><span class="v"><span class="arrow ${tr_nps.cls}">${tr_nps.sym}</span> ${tr_nps.note} (was ${fmtNPS(p.nps)})</span></div>
        <div class="rail-kv"><span class="k">CES</span><span class="v"><span class="arrow ${tr_ces.cls}">${tr_ces.sym}</span> ${tr_ces.note} (was ${fmtCSAT(p.ces)})</span></div>
      </div>`:''}
    </div>
  `;
}
function railAlert(rail, alert) {
  const watchList = (REPORT.scenarios.find(s=>s.id==='velocity_digest')?.result?.watch_list)||[];
  const watchEntry = watchList.find(w => w.includes(alert.sku||alert.product_sku)) || '';
  const isNew = alert.velocity_pct == null;
  const tickets = (REPORT.snapshot.tickets || []).filter(t => t.brand === alert.brand).slice(0,5);
  rail.innerHTML = `
    <div class="rail-head">
      <div class="rail-crumb">Quality Alert · ${isNew?'New SKU':'Velocity Spike'}</div>
      <div class="rail-title">${alert.brand} — <span class="mono">${alert.sku||alert.product_sku}</span></div>
      <div class="rail-sub">${alert.category||'PRODUCT_QUALITY'} · Detected 06:00 GST</div>
    </div>
    <div class="rail-body">
      <div class="rail-section">
        <div class="rail-section-k">Spike detail</div>
        <div class="stat-pair">
          <div class="stat-box"><div class="k">Prior 3d</div><div class="v">${alert.prior??0}</div></div>
          <div class="stat-box"><div class="k">Recent 3d</div><div class="v" style="color:var(--blood)">${alert.recent??alert.ticket_count??'—'}</div></div>
        </div>
        <div class="rail-kv"><span class="k">Change</span><span class="v" style="color:var(--blood);font-weight:700">${alert.velocity_pct!=null?'+'+alert.velocity_pct+'%':'∞'}</span></div>
        <div class="rail-kv"><span class="k">Total (7d)</span><span class="v">${alert.total??alert.ticket_count??'—'} tickets</span></div>
        <div class="rail-kv"><span class="k">Vol-15 threshold</span><span class="v" style="color:var(--teal)">UNDER — would be silent</span></div>
      </div>
      ${watchEntry?`<div class="rail-section"><div class="rail-section-k">Watch list entry</div><div style="font-size:12px;color:var(--dim);font-style:italic;line-height:1.5">"${watchEntry}"</div></div>`:''}
      <div class="rail-section">
        <div class="rail-section-k">Recommended actions</div>
        <div class="action-chips">
          <div class="action-chip"><div><div class="label">Notify Product Team</div><div class="sub">Raise awareness of quality signal</div></div><span>→</span></div>
          <div class="action-chip"><div><div class="label">Escalate to Quality Review</div><div class="sub">Open formal investigation</div></div><span>→</span></div>
        </div>
        <div class="propose-note">Proposing notifies a person — agents don't transact</div>
      </div>
    </div>
  `;
  rail.querySelectorAll('.action-chip').forEach(chip => {
    chip.onclick = () => {
      if(chip.dataset.done) return;
      const label = chip.querySelector('.label').textContent;
      const team = label.toLowerCase().includes('product') ? 'the Product Team' : 'Quality Review';
      toast(`Proposed to ${team} — ${alert.brand} ${alert.sku||alert.product_sku}. A person will action it.`);
      chip.dataset.done = '1'; chip.style.opacity = '.6';
      const arrow = chip.querySelector('span:last-child'); if(arrow) arrow.textContent = '✓';
    };
  });
}
function toast(msg) {
  const t = el('div','toast'); t.innerHTML = `<span class="tk">✓</span> <span>${msg}</span>`;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2800);
}
function railRun(rail, sc) {
  const out = outcomeFor(sc);
  const nums = agentNums(sc.stages);
  const lang = sc.input ? sc.input.lang : '—';
  const isRTL = lang === 'ARABIC';

  let html = `
    <div class="rail-head">
      <div class="rail-crumb">Agent Run · <span class="outcome ${out.cls}">${out.label}</span></div>
      <div class="rail-title" style="font-size:14px;margin-top:6px">${sc.title}</div>
      <div class="rail-sub" style="margin-top:5px">
        <div class="agent-pills" style="margin-bottom:4px">${nums.map(n=>`<span class="a-pill a${n}">Agent ${n}</span>`).join('')}</div>
        ${channelLabel(sc.channel?sc.channel.split(' ')[0]:'—')} · ${langLabel(lang)}
      </div>
    </div>
    <div class="rail-body">
  `;

  // Inbound
  if(sc.input && sc.input.text) {
    html += `<div class="rail-section"><div class="rail-section-k">Inbound</div>
      <div class="msg-block">
        <div class="lang">${sc.input.customer||'—'} · ${langLabel(lang)}</div>
        <div class="msg-body" ${isRTL?'dir="rtl"':''}>${sc.input.text}</div>
      </div></div>`;
  }

  // Agent thread
  html += `<div class="rail-section"><div class="rail-section-k">Agent thread</div><div class="thread-line">`;
  (sc.stages||[]).forEach(stage => {
    html += `<div class="thread-stage"><div class="ts-agent">${stage.agent}</div>`;
    (stage.steps||[]).slice(0,4).forEach(step => {
      const warn = String(step.label).startsWith('⚠') || String(step.label).startsWith('🔴');
      html += `<div class="ts-step"><span class="lbl" style="${warn?'color:var(--blood)':''}">${step.label}</span><span>${step.tool?`<span class="ts-tool ${step.tool==='safety'?'safety':''}">${step.tool}</span>`:''}${step.detail||''}</span></div>`;
    });
    html += '</div>';
  });
  html += '</div></div>';

  // Messages
  if(sc.messages && sc.messages.length) {
    html += `<div class="rail-section"><div class="rail-section-k">Drafted reply</div>`;
    sc.messages.slice(0,1).forEach(m => {
      const rtl = m.language === 'ARABIC';
      html += `<div class="msg-block"><div class="lang">${m.label} · ${langLabel(m.language)}</div><div class="msg-body" ${rtl?'dir="rtl"':''}>${m.text||'—'}</div></div>`;
    });
    html += '</div>';
  }

  // Edge
  if(sc.edge) {
    html += `<div class="edge-quote"><div class="q">"${sc.edge}"</div><div class="src">Why it wins</div></div>`;
  }

  html += '</div>';
  rail.innerHTML = html;
}

/* ─────────────── GO ─────────────── */
boot();
